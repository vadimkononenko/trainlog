openapi: 3.1.0
info:
  title: TrainLog API
  version: 0.1.0
servers:
  - url: http://localhost:8080
    description: Local Vapor server
paths:
  /health:
    get:
      summary: Check API health
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /auth/register:
    post:
      summary: Register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Auth tokens and user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          $ref: "#/components/responses/APIError"
  /auth/login:
    post:
      summary: Login a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Auth tokens and user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/APIError"
  /auth/refresh:
    post:
      summary: Rotate a refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Auth tokens and user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/APIError"
  /auth/logout:
    post:
      summary: Revoke a refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Refresh token revoked
        "401":
          $ref: "#/components/responses/APIError"
  /me:
    get:
      summary: Get the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/APIError"
  /exercises:
    get:
      summary: List exercises
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: query
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            $ref: "#/components/schemas/ExerciseCategory"
        - name: equipment
          in: query
          schema:
            $ref: "#/components/schemas/ExerciseEquipment"
      responses:
        "200":
          description: Paginated exercises
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedExercisesResponse"
        "401":
          $ref: "#/components/responses/APIError"
    post:
      summary: Create a custom exercise
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExerciseRequest"
      responses:
        "200":
          description: Created exercise
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExerciseResponse"
        "401":
          $ref: "#/components/responses/APIError"
  /exercises/{id}:
    get:
      summary: Get exercise details
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ExerciseID"
      responses:
        "200":
          description: Exercise details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExerciseResponse"
        "401":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
    patch:
      summary: Update a custom exercise
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ExerciseID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExerciseRequest"
      responses:
        "200":
          description: Updated exercise
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExerciseResponse"
        "401":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
    delete:
      summary: Delete a custom exercise
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ExerciseID"
      responses:
        "204":
          description: Exercise deleted
        "401":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
  /workout-templates:
    get:
      summary: List workout templates
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated workout templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedWorkoutTemplatesResponse"
        "401":
          $ref: "#/components/responses/APIError"
    post:
      summary: Create a workout template
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkoutTemplateRequest"
      responses:
        "200":
          description: Created workout template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutTemplateResponse"
        "401":
          $ref: "#/components/responses/APIError"
  /workout-templates/{id}:
    get:
      summary: Get workout template details
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkoutTemplateID"
      responses:
        "200":
          description: Workout template details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutTemplateResponse"
        "401":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
    patch:
      summary: Update a workout template
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkoutTemplateID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkoutTemplateRequest"
      responses:
        "200":
          description: Updated workout template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutTemplateResponse"
        "401":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
    delete:
      summary: Delete a workout template
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkoutTemplateID"
      responses:
        "204":
          description: Workout template deleted
        "401":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
  /workout-sessions:
    get:
      summary: List workout sessions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated workout sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedWorkoutSessionsResponse"
        "401":
          $ref: "#/components/responses/APIError"
    post:
      summary: Create a workout session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkoutSessionRequest"
      responses:
        "200":
          description: Created workout session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutSessionResponse"
        "401":
          $ref: "#/components/responses/APIError"
  /workout-sessions/{id}:
    get:
      summary: Get workout session details
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkoutSessionID"
      responses:
        "200":
          description: Workout session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutSessionResponse"
        "401":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
    patch:
      summary: Update a workout session
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkoutSessionID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkoutSessionRequest"
      responses:
        "200":
          description: Updated workout session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutSessionResponse"
        "401":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
    delete:
      summary: Delete a workout session
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkoutSessionID"
      responses:
        "204":
          description: Workout session deleted
        "401":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
  /sync/pull:
    get:
      summary: Pull server changes
      security:
        - bearerAuth: []
      parameters:
        - name: since
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Sync pull response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncPullResponse"
        "401":
          $ref: "#/components/responses/APIError"
  /sync/push:
    post:
      summary: Push client mutations
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncPushRequest"
      responses:
        "200":
          description: Accepted sync mutations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncPushResponse"
        "401":
          $ref: "#/components/responses/APIError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
    ExerciseID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkoutTemplateID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkoutSessionID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    APIError:
      description: API error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    LogoutRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    AuthResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - user
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/UserResponse"
    UserResponse:
      type: object
      required:
        - id
        - email
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
    APIErrorResponse:
      type: object
      required:
        - code
        - message
        - details
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties:
            type: string
    ExerciseCategory:
      type: string
      enum:
        - chest
        - back
        - legs
        - shoulders
        - arms
        - core
        - cardio
        - other
    ExerciseType:
      type: string
      enum:
        - strength
        - cardio
        - mobility
        - bodyweight
    ExerciseEquipment:
      type: string
      enum:
        - barbell
        - dumbbell
        - machine
        - band
        - bodyweight
        - cable
        - kettlebell
        - other
    CreateExerciseRequest:
      type: object
      required:
        - name
        - category
        - exerciseType
        - equipment
        - primaryMuscles
        - instructions
      properties:
        name:
          type: string
        category:
          $ref: "#/components/schemas/ExerciseCategory"
        exerciseType:
          $ref: "#/components/schemas/ExerciseType"
        equipment:
          $ref: "#/components/schemas/ExerciseEquipment"
        primaryMuscles:
          type: array
          items:
            type: string
        instructions:
          type: string
    UpdateExerciseRequest:
      type: object
      properties:
        name:
          type: string
        category:
          $ref: "#/components/schemas/ExerciseCategory"
        exerciseType:
          $ref: "#/components/schemas/ExerciseType"
        equipment:
          $ref: "#/components/schemas/ExerciseEquipment"
        primaryMuscles:
          type: array
          items:
            type: string
        instructions:
          type: string
    ExerciseResponse:
      type: object
      required:
        - id
        - name
        - category
        - exerciseType
        - equipment
        - primaryMuscles
        - instructions
        - version
      properties:
        id:
          type: string
          format: uuid
        ownerUserId:
          type:
            - string
            - "null"
          format: uuid
        name:
          type: string
        category:
          $ref: "#/components/schemas/ExerciseCategory"
        exerciseType:
          $ref: "#/components/schemas/ExerciseType"
        equipment:
          $ref: "#/components/schemas/ExerciseEquipment"
        primaryMuscles:
          type: array
          items:
            type: string
        instructions:
          type: string
        createdAt:
          $ref: "#/components/schemas/NullableDateTime"
        updatedAt:
          $ref: "#/components/schemas/NullableDateTime"
        deletedAt:
          $ref: "#/components/schemas/NullableDateTime"
        version:
          type: integer
    WorkoutTemplateExerciseRequest:
      type: object
      required:
        - exerciseId
      properties:
        exerciseId:
          type: string
          format: uuid
        position:
          type: integer
          minimum: 1
        targetSets:
          type: integer
          minimum: 1
        targetReps:
          type: integer
          minimum: 1
        targetWeight:
          type: number
          minimum: 0
        restSeconds:
          type: integer
          minimum: 0
        notes:
          $ref: "#/components/schemas/NullableString"
    CreateWorkoutTemplateRequest:
      type: object
      required:
        - name
        - exercises
      properties:
        name:
          type: string
        notes:
          $ref: "#/components/schemas/NullableString"
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutTemplateExerciseRequest"
    UpdateWorkoutTemplateRequest:
      type: object
      properties:
        name:
          type: string
        notes:
          $ref: "#/components/schemas/NullableString"
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutTemplateExerciseRequest"
    WorkoutTemplateExerciseResponse:
      type: object
      required:
        - id
        - exerciseId
        - position
      properties:
        id:
          type: string
          format: uuid
        exerciseId:
          type: string
          format: uuid
        position:
          type: integer
        targetSets:
          type:
            - integer
            - "null"
        targetReps:
          type:
            - integer
            - "null"
        targetWeight:
          type:
            - number
            - "null"
        restSeconds:
          type:
            - integer
            - "null"
        notes:
          $ref: "#/components/schemas/NullableString"
    WorkoutTemplateResponse:
      type: object
      required:
        - id
        - ownerUserId
        - name
        - exercises
        - version
      properties:
        id:
          type: string
          format: uuid
        ownerUserId:
          type: string
          format: uuid
        name:
          type: string
        notes:
          $ref: "#/components/schemas/NullableString"
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutTemplateExerciseResponse"
        createdAt:
          $ref: "#/components/schemas/NullableDateTime"
        updatedAt:
          $ref: "#/components/schemas/NullableDateTime"
        deletedAt:
          $ref: "#/components/schemas/NullableDateTime"
        version:
          type: integer
    WorkoutSetRequest:
      type: object
      properties:
        position:
          type: integer
          minimum: 1
        reps:
          type: integer
          minimum: 1
        weight:
          type: number
          minimum: 0
        durationSeconds:
          type: integer
          minimum: 0
        distanceMeters:
          type: number
          minimum: 0
        isCompleted:
          type: boolean
        notes:
          $ref: "#/components/schemas/NullableString"
    WorkoutSessionExerciseRequest:
      type: object
      required:
        - exerciseId
        - sets
      properties:
        exerciseId:
          type: string
          format: uuid
        position:
          type: integer
          minimum: 1
        notes:
          $ref: "#/components/schemas/NullableString"
        sets:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSetRequest"
    CreateWorkoutSessionRequest:
      type: object
      required:
        - startedAt
        - exercises
      properties:
        templateId:
          type:
            - string
            - "null"
          format: uuid
        startedAt:
          type: string
          format: date-time
        endedAt:
          $ref: "#/components/schemas/NullableDateTime"
        notes:
          $ref: "#/components/schemas/NullableString"
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSessionExerciseRequest"
    UpdateWorkoutSessionRequest:
      type: object
      properties:
        templateId:
          type:
            - string
            - "null"
          format: uuid
        startedAt:
          type: string
          format: date-time
        endedAt:
          $ref: "#/components/schemas/NullableDateTime"
        notes:
          $ref: "#/components/schemas/NullableString"
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSessionExerciseRequest"
    WorkoutSetResponse:
      type: object
      required:
        - id
        - position
        - isCompleted
      properties:
        id:
          type: string
          format: uuid
        position:
          type: integer
        reps:
          type:
            - integer
            - "null"
        weight:
          type:
            - number
            - "null"
        durationSeconds:
          type:
            - integer
            - "null"
        distanceMeters:
          type:
            - number
            - "null"
        isCompleted:
          type: boolean
        notes:
          $ref: "#/components/schemas/NullableString"
    WorkoutSessionExerciseResponse:
      type: object
      required:
        - id
        - exerciseId
        - position
        - sets
      properties:
        id:
          type: string
          format: uuid
        exerciseId:
          type: string
          format: uuid
        position:
          type: integer
        notes:
          $ref: "#/components/schemas/NullableString"
        sets:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSetResponse"
    WorkoutSessionResponse:
      type: object
      required:
        - id
        - ownerUserId
        - startedAt
        - exercises
        - version
      properties:
        id:
          type: string
          format: uuid
        ownerUserId:
          type: string
          format: uuid
        templateId:
          type:
            - string
            - "null"
          format: uuid
        startedAt:
          type: string
          format: date-time
        endedAt:
          $ref: "#/components/schemas/NullableDateTime"
        notes:
          $ref: "#/components/schemas/NullableString"
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSessionExerciseResponse"
        createdAt:
          $ref: "#/components/schemas/NullableDateTime"
        updatedAt:
          $ref: "#/components/schemas/NullableDateTime"
        deletedAt:
          $ref: "#/components/schemas/NullableDateTime"
        version:
          type: integer
    SyncMutationAction:
      type: string
      enum:
        - create
        - update
        - delete
    SyncWorkoutTemplateMutation:
      type: object
      required:
        - action
      properties:
        action:
          $ref: "#/components/schemas/SyncMutationAction"
        id:
          type:
            - string
            - "null"
          format: uuid
        template:
          anyOf:
            - $ref: "#/components/schemas/CreateWorkoutTemplateRequest"
            - type: "null"
    SyncWorkoutSessionMutation:
      type: object
      required:
        - action
      properties:
        action:
          $ref: "#/components/schemas/SyncMutationAction"
        id:
          type:
            - string
            - "null"
          format: uuid
        session:
          anyOf:
            - $ref: "#/components/schemas/CreateWorkoutSessionRequest"
            - type: "null"
    SyncPullResponse:
      type: object
      required:
        - serverTime
        - exercises
        - workoutTemplates
        - workoutSessions
      properties:
        serverTime:
          type: string
          format: date-time
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/ExerciseResponse"
        workoutTemplates:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutTemplateResponse"
        workoutSessions:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSessionResponse"
    SyncPushRequest:
      type: object
      required:
        - workoutTemplates
        - workoutSessions
      properties:
        workoutTemplates:
          type: array
          items:
            $ref: "#/components/schemas/SyncWorkoutTemplateMutation"
        workoutSessions:
          type: array
          items:
            $ref: "#/components/schemas/SyncWorkoutSessionMutation"
    SyncPushResponse:
      type: object
      required:
        - serverTime
        - workoutTemplates
        - workoutSessions
        - deletedWorkoutTemplateIds
        - deletedWorkoutSessionIds
      properties:
        serverTime:
          type: string
          format: date-time
        workoutTemplates:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutTemplateResponse"
        workoutSessions:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSessionResponse"
        deletedWorkoutTemplateIds:
          type: array
          items:
            type: string
            format: uuid
        deletedWorkoutSessionIds:
          type: array
          items:
            type: string
            format: uuid
    PaginationMetadata:
      type: object
      required:
        - page
        - limit
        - total
        - hasNextPage
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        hasNextPage:
          type: boolean
    PaginatedExercisesResponse:
      type: object
      required:
        - items
        - metadata
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ExerciseResponse"
        metadata:
          $ref: "#/components/schemas/PaginationMetadata"
    PaginatedWorkoutTemplatesResponse:
      type: object
      required:
        - items
        - metadata
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutTemplateResponse"
        metadata:
          $ref: "#/components/schemas/PaginationMetadata"
    PaginatedWorkoutSessionsResponse:
      type: object
      required:
        - items
        - metadata
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSessionResponse"
        metadata:
